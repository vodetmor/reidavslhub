<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rei da VSL — Repositório de Entregas</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #000000;
      --text-color: #ffffff;
      --accent-color: #ffc107; /* Rei da VSL Yellow */
      --gray-color: #888888;
    }

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(25, 25, 25, 0.5);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(5px);
    }

    .icon-lock {
      width: 48px;
      height: 48px;
      margin-bottom: 1.5rem;
      fill: var(--accent-color);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 1rem;
      font-weight: 300;
      line-height: 1.6;
      color: var(--gray-color);
      margin-bottom: 0;
    }

    .branding {
      position: absolute;
      bottom: 2rem;
      font-size: 0.8rem;
      color: var(--gray-color);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .branding span {
      color: var(--accent-color);
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="container">
    <svg class="icon-lock" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
      <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/>
    </svg>
    <h1>Ambiente Restrito</h1>
    <p>Este ambiente é um repositório de visualização exclusivo para homologação e entrega de projetos a clientes.</p>
  </div>

  <div class="branding">
    Powered by <span>Rei da VSL</span>
  </div>

</body>
</html>
